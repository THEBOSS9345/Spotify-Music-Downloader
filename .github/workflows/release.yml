name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        os: [linux, windows]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
        working-directory: frontend

      - run: npm run build
        working-directory: frontend

      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true

      - name: Build
        env:
          GOOS: ${{ matrix.os }}
        run: |
          ext=""
          [ "$GOOS" = "windows" ] && ext=".exe"
          go build -o "music-downloader-$GOOS$ext" -ldflags="-s -w"

      - uses: actions/upload-artifact@v4
        with:
          name: music-downloader-${{ matrix.os }}
          path: music-downloader-*

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: music-downloader-*
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            music-downloader-linux
            music-downloader-windows.exe
          generate_release_notes: true
