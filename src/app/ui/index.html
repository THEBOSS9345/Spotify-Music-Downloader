<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Music Downloader</title>
<style>{{STYLE}}</style>
</head>
<body>
<div id="app">
  <div id="view-login" class="view">
    <div class="login-card">
      <div class="login-logo">
        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="#1DB954" stroke-width="1.5">
          <circle cx="12" cy="12" r="10"/>
          <path d="M9 18V6l11 6-11 6z" fill="#1DB954" stroke="none"/>
        </svg>
      </div>
      <h1>Music Downloader</h1>
      <p class="login-subtitle">Download your Spotify playlists<br>straight from YouTube</p>
      <button id="btn-login" class="btn-spotify" onclick="handleLogin()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z"/></svg>
        Login with Spotify
      </button>
      <p id="login-error" class="login-error hidden"></p>
    </div>
  </div>

  <div id="view-app" class="view hidden">
    <aside id="sidebar">
      <div class="sidebar-header">
        <div class="user-profile" onclick="navigate('downloads')">
          <img id="user-avatar" class="user-avatar" src="" alt="">
          <div class="user-info">
            <span id="user-name" class="user-name"></span>
            <span class="user-label">My Library</span>
          </div>
        </div>
      </div>

      <div class="sidebar-nav">
        <div class="sidebar-section-header">
          <h3>Your Playlists</h3>
        </div>
        <div id="playlist-list" class="playlist-list"></div>
      </div>

      <div class="sidebar-footer">
        <button id="btn-downloads-sidebar" class="sidebar-btn" onclick="navigate('downloads')">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Downloads
          <span id="download-badge" class="badge hidden">0</span>
        </button>
        <button class="sidebar-btn logout-btn" onclick="handleLogout()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          Logout
        </button>
      </div>
    </aside>

    <main id="main-content">
      <div id="view-empty" class="page active">
        <div class="empty-state">
          <svg width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="#535353" stroke-width="1.5">
            <circle cx="12" cy="12" r="10"/>
            <path d="M9 18V6l11 6-11 6z" fill="#535353" stroke="none"/>
          </svg>
          <h2>Select a playlist</h2>
          <p>Choose a playlist from the sidebar to view and download its songs</p>
        </div>
      </div>

      <div id="view-playlist" class="page">
        <div id="playlist-header" class="playlist-header">
          <img id="playlist-image" class="playlist-image" src="" alt="">
          <div class="playlist-info">
            <span class="playlist-label">PLAYLIST</span>
            <h1 id="playlist-name"></h1>
            <p id="playlist-desc" class="playlist-desc"></p>
            <p id="playlist-meta" class="playlist-meta"></p>
            <div class="playlist-actions">
              <button id="btn-download-all" class="btn-primary" onclick="downloadAll()">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                Download All
              </button>
              <button id="btn-download-selected" class="btn-secondary" onclick="downloadSelected()" disabled>
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                Download Selected
              </button>
            </div>
          </div>
        </div>

        <div id="playlist-loading" class="loading-state">
          <div class="spinner"></div>
          <p>Loading songs...</p>
        </div>

        <div id="playlist-songs" class="playlist-songs hidden">
          <div class="songs-table">
            <div class="songs-table-header">
              <div class="col-check"><input type="checkbox" id="select-all" onchange="toggleSelectAll()"></div>
              <div class="col-num">#</div>
              <div class="col-title">Title</div>
              <div class="col-artist">Artist</div>
              <div class="col-album">Album</div>
              <div class="col-duration">Duration</div>
              <div class="col-action"></div>
            </div>
            <div id="songs-list" class="songs-list"></div>
          </div>
        </div>
      </div>

      <div id="view-downloads" class="page">
        <div class="downloads-header">
          <h1>Downloads</h1>
          <button id="btn-clear-downloads" class="btn-text" onclick="clearDownloads()">Clear All</button>
        </div>
        <div id="downloads-list" class="downloads-list"></div>
      </div>
    </main>
  </div>

  <div id="toast-container" class="toast-container"></div>
</div>

<script>{{SCRIPT}}</script>
</body>
</html>
